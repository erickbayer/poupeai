<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capivara Finance • Seu Controle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .tab-content {
      animation: fadeInUp 0.4s ease forwards;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .modal {
      animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.7) translateY(40px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
    }
    
    .table-row {
      transition: all 0.2s ease;
    }
    
    .nav-button {
      position: relative;
      transition: all 0.3s ease;
    }
    
    .nav-button::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 3px;
      background-color: #14b8a6;
      transition: width 0.3s ease;
    }
    
    .tab-active::after {
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-700">

<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="w-72 bg-white shadow-xl flex flex-col">
    <div class="p-8 border-b">
      <div class="flex items-center gap-3">
        <img src="/home/workdir/attachments/capivara 1.png" alt="Capivara Finance" class="w-14 h-14 object-contain drop-shadow-md">
        <div>
          <h1 class="text-2xl font-bold text-teal-600 tracking-tight">Capivara Finance</h1>
          <p class="text-xs text-gray-500 tracking-widest">SEU DINHEIRO EM ORDEM</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-6 space-y-1">
      <button onclick="showTab(0)" class="nav-button tab-btn w-full text-left px-6 py-4 rounded-2xl hover:bg-teal-50 flex items-center gap-3 tab-active" id="tab0">
        <i class="fas fa-home w-5"></i> Dashboard
      </button>
      <button onclick="showTab(1)" class="nav-button tab-btn w-full text-left px-6 py-4 rounded-2xl hover:bg-teal-50 flex items-center gap-3" id="tab1">
        <i class="fas fa-exchange-alt w-5"></i> Transações
      </button>
      <button onclick="showTab(2)" class="nav-button tab-btn w-full text-left px-6 py-4 rounded-2xl hover:bg-teal-50 flex items-center gap-3" id="tab2">
        <i class="fas fa-tags w-5"></i> Categorias
      </button>
      <button onclick="showTab(3)" class="nav-button tab-btn w-full text-left px-6 py-4 rounded-2xl hover:bg-teal-50 flex items-center gap-3" id="tab3">
        <i class="fas fa-chart-pie w-5"></i> Gráficos
      </button>
      <button onclick="showTab(4)" class="nav-button tab-btn w-full text-left px-6 py-4 rounded-2xl hover:bg-teal-50 flex items-center gap-3" id="tab4">
        <i class="fas fa-file-alt w-5"></i> Relatórios
      </button>
      <button onclick="showTab(5)" class="nav-button tab-btn w-full text-left px-6 py-4 rounded-2xl hover:bg-teal-50 flex items-center gap-3" id="tab5">
        <i class="fas fa-calendar-alt w-5"></i> Parcelados
      </button>
    </nav>

    <div class="p-6 border-t text-center text-xs text-gray-400">
      Feito com ❤️ e uma capivara
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 overflow-auto p-10 bg-gray-50">

    <!-- DASHBOARD -->
    <div id="content0" class="tab-content">
      <h2 class="text-4xl font-semibold text-gray-800 mb-8">Bem-vindo de volta 👋</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white rounded-3xl shadow-sm p-8 card-hover" id="card-saldo">
          <p class="text-gray-500 text-sm">Saldo Atual</p>
          <p class="text-5xl font-semibold text-teal-600 mt-2" id="saldo">R$ 0,00</p>
        </div>
        <div class="bg-white rounded-3xl shadow-sm p-8 card-hover">
          <p class="text-gray-500 text-sm">Receitas do Mês</p>
          <p class="text-5xl font-semibold text-blue-600 mt-2" id="receitas">R$ 0,00</p>
        </div>
        <div class="bg-white rounded-3xl shadow-sm p-8 card-hover">
          <p class="text-gray-500 text-sm">Despesas do Mês</p>
          <p class="text-5xl font-semibold text-rose-600 mt-2" id="despesas">R$ 0,00</p>
        </div>
      </div>
    </div>

    <!-- TRANSAÇÕES -->
    <div id="content1" class="tab-content hidden">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-semibold">Transações</h2>
        <button onclick="abrirModalTransacao()" 
                class="bg-teal-600 hover:bg-teal-700 text-white px-8 py-4 rounded-2xl flex items-center gap-3 font-medium transition-all active:scale-95">
          <i class="fas fa-plus"></i> Nova Transação
        </button>
      </div>
      <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
        <table class="w-full" id="tabela-transacoes">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-6 text-left font-medium">Data</th>
              <th class="p-6 text-left font-medium">Descrição</th>
              <th class="p-6 text-left font-medium">Categoria</th>
              <th class="p-6 text-left font-medium">Método</th>
              <th class="p-6 text-right font-medium">Valor</th>
            </tr>
          </thead>
          <tbody class="divide-y" id="tbody-transacoes"></tbody>
        </table>
      </div>
    </div>

    <!-- CATEGORIAS, GRÁFICOS, RELATÓRIOS e PARCELADOS permanecem iguais (mas agora com animações) -->
    <div id="content2" class="tab-content hidden"> <!-- Categorias --> </div>
    <div id="content3" class="tab-content hidden"> <!-- Gráficos --> </div>
    <div id="content4" class="tab-content hidden"> <!-- Relatórios --> </div>
    <div id="content5" class="tab-content hidden"> <!-- Parcelados --> </div>
  </div>
</div>

<!-- Modal Transação -->
<div id="modal-transacao" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="modal bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
    <!-- Formulário da transação (mesmo de antes) -->
    <h3 class="text-2xl font-semibold mb-6">Nova Transação</h3>
    <form id="form-transacao">
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium mb-1">Tipo</label>
          <select id="tipo" class="w-full p-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-teal-500 transition">
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Descrição</label>
          <input type="text" id="descricao" required class="w-full p-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-teal-500 transition">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Valor (R$)</label>
            <input type="number" step="0.01" id="valor" required class="w-full p-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-teal-500 transition">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Data</label>
            <input type="date" id="data" required class="w-full p-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-teal-500 transition">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Categoria</label>
          <input type="text" id="categoria" class="w-full p-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-teal-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Método</label>
          <select id="metodo" class="w-full p-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-teal-500 transition">
            <option value="PIX">PIX</option>
            <option value="Cartão">Cartão de Crédito</option>
            <option value="Cartão Débito">Cartão de Débito</option>
            <option value="Dinheiro">Dinheiro</option>
          </select>
        </div>
      </div>
      <div class="flex gap-4 mt-10">
        <button type="button" onclick="fecharModalTransacao()" class="flex-1 py-4 border border-gray-300 rounded-2xl hover:bg-gray-50 transition">Cancelar</button>
        <button type="submit" class="flex-1 py-4 bg-teal-600 text-white rounded-2xl hover:bg-teal-700 active:scale-95 transition">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
// === JavaScript (mantido + pequenas melhorias) ===
let transacoes = JSON.parse(localStorage.getItem('transacoes')) || [];
let categorias = JSON.parse(localStorage.getItem('categorias')) || ["Alimentação", "Transporte", "Moradia", "Saúde", "Educação", "Lazer", "Salário"];

function showTab(n) {
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.add('hidden');
    // Reset animation
    void el.offsetWidth;
  });
  
  const activeTab = document.getElementById(`content${n}`);
  activeTab.classList.remove('hidden');
  
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('tab-active'));
  document.getElementById(`tab${n}`).classList.add('tab-active');

  if (n === 0) atualizarDashboard();
  if (n === 1) renderizarTransacoes();
  if (n === 2) renderizarCategorias();
  if (n === 3) criarGraficoPizza();
  if (n === 4) gerarRelatorio();
}

// Modal functions
function abrirModalTransacao() {
  const modal = document.getElementById('modal-transacao');
  modal.classList.remove('hidden');
  document.getElementById('form-transacao').reset();
}

function fecharModalTransacao() {
  const modal = document.getElementById('modal-transacao');
  modal.style.animation = 'modalPop 0.2s reverse';
  setTimeout(() => {
    modal.classList.add('hidden');
    modal.style.animation = '';
  }, 200);
}

// Restante do JavaScript (atualizarDashboard, renderizarTransacoes, etc.) continua igual ao código anterior.
// Copie as funções completas da versão anterior se precisar.

document.getElementById('form-transacao').addEventListener('submit', function(e) {
  e.preventDefault();
  // ... (lógica de salvar transação igual à anterior)
  fecharModalTransacao();
  atualizarDashboard();
  renderizarTransacoes();
});

// Inicialização
showTab(0);
</script>
</body>
</html>
